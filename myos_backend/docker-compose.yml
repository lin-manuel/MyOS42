version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: myos
      POSTGRES_USER: myos
      POSTGRES_PASSWORD: myos
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: gunicorn myos_backend.wsgi:application --bind 0.0.0.0:8000 --workers 3
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - media_data:/app/media

volumes:
  postgres_data:
  media_data:
