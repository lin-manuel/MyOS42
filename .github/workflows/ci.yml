name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: myos
          POSTGRES_USER: myos
          POSTGRES_PASSWORD: myos
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r myos_backend/requirements-dev.txt
      - name: Lint
        run: |
          black --check myos_backend
          isort --check-only myos_backend
      - name: Type check
        run: mypy myos_backend || true
      - name: Backend tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          DATABASE_ENGINE: postgres
          DATABASE_NAME: myos
          DATABASE_USER: myos
          DATABASE_PASSWORD: myos
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: 5432
          REDIS_URL: redis://127.0.0.1:6379/0
        run: |
          python myos_backend/manage.py migrate
          coverage run --rcfile=.coveragerc myos_backend/manage.py test
          coverage report --rcfile=.coveragerc
      - name: Build Docker image
        run: docker build -t myos-api .
